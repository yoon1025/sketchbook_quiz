<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스케치북 마스터 퀴즈 & 리더보드</title>
    
    <!-- Chosen Palette: Sketchbook Pro Elite (Slate-50, Indigo-600, White, Slate-950) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =========================================================
        // [사용자님의 Firebase 설정 적용 완료]
        // =========================================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyDFesJaSSfPLtlG9gRu-nAkPLiY_Ts2yQg",
            authDomain: "sketchbook-quiz.firebaseapp.com",
            projectId: "sketchbook-quiz",
            storageBucket: "sketchbook-quiz.firebasestorage.app",
            messagingSenderId: "1071967008197",
            appId: "1:1071967008197:web:9f3009a8b281d6400147ac",
            measurementId: "G-BSM6H4LRC3"
        };

        let firebaseConfig = (typeof __firebase_config !== 'undefined' && __firebase_config) 
            ? JSON.parse(__firebase_config) 
            : myFirebaseConfig;

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sketchbook-master-final-v12';

        window.appState = {
            user: null,
            userName: "",
            currentScore: 0,
            startTime: null,
            totalTime: 0,
            leaderboard: [],
            isDbConnected: false
        };

        let db, auth;

        const initFirebase = async () => {
            if (!firebaseConfig.apiKey) return;
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    window.appState.user = user;
                    if (user) {
                        window.appState.isDbConnected = true;
                        loadLeaderboard();
                    }
                });
            } catch (error) {
                console.error("Firebase 연결 오류:", error);
            }
        };

        initFirebase();

        function loadLeaderboard() {
            if (!db || !window.appState.user) return;
            const leaderboardCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            onSnapshot(leaderboardCol, (snapshot) => {
                const data = [];
                snapshot.forEach(doc => data.push(doc.data()));
                const sorted = data.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return a.time - b.time;
                }).slice(0, 10);
                window.appState.leaderboard = sorted;
                renderLeaderboard();
            }, (err) => console.error("리더보드 로딩 오류:", err));
        }

        window.submitScore = async (score, time) => {
            if (!db || !window.appState.userName) return;
            try {
                const leaderboardCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                await addDoc(leaderboardCol, {
                    name: window.appState.userName,
                    score: score,
                    time: time,
                    timestamp: Date.now()
                });
            } catch (e) { console.error("점수 저장 실패:", e); }
        };

        window.resetLeaderboardData = async (password) => {
            if (password !== "reset1234") { showToast("비밀번호가 틀렸습니다.", "error"); return; }
            if (!db) return;
            try {
                const leaderboardCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                const snapshot = await getDocs(leaderboardCol);
                const deletePromises = snapshot.docs.map(d => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', d.id)));
                await Promise.all(deletePromises);
                showToast("데이터 초기화 완료!", "success");
                closeResetModal();
            } catch (error) { showToast("초기화 중 오류 발생", "error"); }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .quiz-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .quiz-card:hover:not(:disabled) { transform: translateY(-3px); border-color: #6366f1; background-color: #f5f3ff; }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        
        /* 이미지 영역 크기 원복 (더 크게) */
        .visual-box { width: 100%; height: 230px; background-color: #fff; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e8f0; margin-bottom: 1.5rem; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05); }
        .visual-box img { max-height: 90%; max-width: 90%; object-fit: contain; }
        
        /* 피드백 오버레이 스타일 (중앙 유지) */
        #feedback-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 20;
            align-items: center;
            justify-content: center;
            border-radius: 2.5rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .feedback-content { transform: scale(1.2); text-align: center; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Admin Modal -->
    <div id="reset-modal" class="modal-overlay">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center border border-slate-200">
            <h3 class="text-xl font-black mb-4 text-slate-800">기록 초기화</h3>
            <input type="password" id="admin-pw" placeholder="비밀번호" class="w-full px-5 py-3 rounded-xl border-2 border-slate-100 mb-6 text-center font-bold focus:border-indigo-500 focus:outline-none">
            <div class="flex gap-2">
                <button onclick="closeResetModal()" class="flex-1 py-3 text-slate-500 font-bold hover:bg-slate-50 rounded-xl">취소</button>
                <button onclick="confirmReset()" class="flex-1 py-3 bg-rose-500 text-white rounded-xl font-bold hover:bg-rose-600 transition-colors">데이터 삭제</button>
            </div>
        </div>
    </div>

    <!-- Toast UI -->
    <div id="system-toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[110] px-8 py-3 rounded-full shadow-2xl font-bold text-sm hidden transform transition-all duration-300">
        <span id="toast-text"></span>
    </div>

    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="openResetModal()" class="text-2xl hover:rotate-12 transition-transform cursor-pointer">✏️</button>
                <h1 class="font-black text-xl text-slate-900 tracking-tight uppercase italic">Sketchbook Pro Master</h1>
            </div>
            <div id="user-info" class="hidden text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100">
                <span id="display-name"></span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 md:p-6 flex flex-col md:flex-row gap-8">
        
        <!-- Area 1: Leaderboard (Left) -->
        <section class="w-full md:w-5/12 lg:w-4/12 flex flex-col">
            <div class="bg-white rounded-[2rem] shadow-lg border border-slate-200 overflow-hidden sticky top-24">
                <div class="bg-slate-900 p-6 text-white text-center">
                    <div class="text-4xl mb-2">🏆</div>
                    <h3 class="text-xl font-black">명예의 전당</h3>
                    <p class="text-slate-400 text-[10px] uppercase font-bold tracking-widest">Artist Ranking - Top 10</p>
                </div>
                <div class="p-5">
                    <div id="leaderboard-list" class="space-y-2"></div>
                    <div id="no-data" class="hidden py-24 text-center text-slate-300 italic">기록을 기다리고 있습니다...</div>
                </div>
            </div>
        </section>

        <!-- Area 2: Quiz Engine (Right) -->
        <section id="quiz-area-root" class="w-full md:w-7/12 lg:w-8/12 flex flex-col min-h-[680px]">
            
            <!-- 1. Entry View -->
            <div id="entry-view" class="bg-white p-10 md:p-16 rounded-[2.5rem] shadow-xl border border-slate-200 flex-grow flex flex-col justify-center items-center">
                <div class="text-center mb-12">
                    <div class="w-24 h-24 bg-slate-900 text-white rounded-3xl flex items-center justify-center text-5xl mx-auto mb-8 shadow-2xl">⚡</div>
                    <h2 class="text-4xl font-black text-slate-900 tracking-tight">스케치북 마스터 퀴즈</h2>
                    <p class="text-slate-500 mt-4 font-medium text-lg leading-relaxed text-center">디지털 드로잉 도구의 숨겨진 기능을 마스터하세요!<br>이미지를 자세히 보고 정답을 맞춰보세요.</p>
                </div>
                <div class="w-full max-w-sm space-y-6">
                    <!-- 엔터키 지원을 위한 onkeyup 추가 -->
                    <input type="text" id="name-input" maxlength="10" placeholder="닉네임 입력" 
                           onkeyup="if(event.key === 'Enter') startQuiz()"
                           class="w-full px-8 py-5 rounded-2xl border-2 border-slate-100 bg-slate-50 focus:border-indigo-500 focus:bg-white focus:outline-none transition-all text-xl font-bold placeholder:text-slate-300 text-center">
                    <button onclick="startQuiz()" class="w-full bg-indigo-600 text-white font-black py-6 rounded-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all text-2xl">퀴즈 시작 🚀</button>
                </div>
            </div>

            <!-- 2. Quiz View -->
            <div id="quiz-view" class="hidden bg-white p-6 md:p-10 rounded-[2.5rem] shadow-xl border border-slate-200 flex-grow flex flex-col relative">
                <!-- 피드백 오버레이 (중앙 배치) -->
                <div id="feedback-overlay">
                    <div class="feedback-content">
                        <div id="feedback-emoji" class="text-8xl mb-4"></div>
                        <div id="feedback-text" class="text-5xl font-black"></div>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-8 pb-6 border-b border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="bg-slate-900 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest" id="q-progress">Q 1/10</div>
                        <div class="flex items-center gap-2 text-indigo-600 font-mono font-black text-2xl" id="timer">00:00</div>
                    </div>
                    <div class="text-right">
                        <span id="live-score" class="text-3xl font-black text-indigo-600">0</span>
                        <span class="text-[10px] text-slate-400 block font-black uppercase">Points</span>
                    </div>
                </div>

                <div class="flex-grow flex flex-col justify-center">
                    <h3 id="question-header" class="text-2xl md:text-3xl font-black leading-tight text-slate-800 mb-8 text-center"></h3>
                    <div class="visual-box shadow-inner">
                        <img id="question-img" src="" alt="Sketchbook Interface Component">
                    </div>
                    <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <!-- 3. Result View -->
            <div id="result-view" class="hidden bg-white p-12 rounded-[2.5rem] shadow-xl border border-slate-200 text-center flex flex-col justify-center items-center h-full">
                <div class="text-9xl mb-10">🏅</div>
                <h2 class="text-5xl font-black text-slate-900 mb-4">마스터 등극!</h2>
                <p class="text-slate-500 mb-12 font-bold text-xl leading-relaxed">수고하셨습니다!<br>실시간 명예의 전당에서 당신의 순위를 확인하세요.</p>
                <div class="grid grid-cols-2 gap-8 mb-12 max-w-md w-full">
                    <div class="bg-indigo-50 p-8 rounded-[2rem] border-2 border-indigo-100 text-center">
                        <span class="text-[10px] text-indigo-400 block uppercase font-black mb-1">Score</span>
                        <span id="final-score" class="text-5xl font-black text-indigo-600 block">0</span>
                    </div>
                    <div class="bg-slate-50 p-8 rounded-[2rem] border-2 border-slate-100 text-center">
                        <span class="text-[10px] text-slate-400 block uppercase font-black mb-1">Time</span>
                        <span id="final-time" class="text-5xl font-black text-slate-800 block">0s</span>
                    </div>
                </div>
                <button onclick="resetApp()" class="w-full max-w-sm bg-slate-900 text-white font-black py-6 rounded-2xl hover:bg-black transition-all text-2xl shadow-xl shadow-slate-200">다시 도전하기 🔄</button>
            </div>

        </section>
    </main>

    <footer class="py-10 text-center text-slate-400 text-[10px] font-black uppercase tracking-[0.5em]">
        Sketchbook Pro Master Interactive Challenge
    </footer>

    <script>
        const questions = [
            { header: "브러시 팔레트 옆에 스크롤의 기능은 무엇일까요?", img: "https://i.postimg.cc/QCYZr8sr/seukeulinsyas-2026-03-08-194419.png", o: ["브러시 크기 및 불투명도 조절", "브러시 종류 변경", "레이어 가시성 켜기/끄기", "캔버스 전체 저장"], a: 0 },
            { header: "이것의 기능은 무엇일까요?", img: "https://i.postimg.cc/nrPgP3KR/seukeulinsyas-2026-03-08-194246.png", o: ["선을 매끄럽게 자동 보정(예측 스트로크)", "선을 점선으로 그리기", "선의 색상을 자동으로 변경", "선 끝부분을 뭉툭하게 만들기"], a: 0 },
            { header: "이것의 기능은 무엇일까요?", img: "https://i.postimg.cc/vB8K8J30/seukeulinsyas-2026-03-08-194254.png", o: ["외부 사진이나 이미지 가져오기(Import Image)", "그린 그림을 갤러리에 저장", "전체 레이어를 하나로 병합", "그림의 일부를 잘라내기"], a: 0 },
            { header: "이것의 기능은 무엇일까요?", img: "https://i.postimg.cc/7hdtVfwH/seukeulinsyas-2026-03-08-194301.png", o: ["도형(직선, 원, 사각형) 그리기 가이드", "대칭 도구 활성화", "툴바 숨김 해제", "원근법 가이드 설정"], a: 2 },
            { header: "더블 퍽의 기능이 아닌것은?", img: "https://i.postimg.cc/jSz3Hx1B/seukeulinsyas-2026-03-08-194313.png", o: ["브러시 사이즈와 투명도", "현재 브러시", "현재 레이어", "현재 색상"], a: 2 },
            { header: "이것의 기능은 무엇일까요?", img: "https://i.postimg.cc/k45jPx5M/seukeulinsyas-2026-03-08-194322.png", o: ["해당 레이어 보이기/숨기기(가시성 조절)", "레이어 편집 잠금", "레이어 모든 내용 삭제", "새 레이어 추가하기"], a: 0 },
            { header: "오른쪽 상단을 두번 탭하는 기능은?", img: "https://i.postimg.cc/QC2S7wkz/seukeulinsyas-2026-03-08-194330.png", o: ["그림의 위치 및 크기 변형", "화면 맞춤", "캔버스 전체 해상도 조절", "화면 확대/축소 잠금"], a: 1 },
            { header: "이 것은 'undo' 기능입니다. 탭하는 위치는?", img: "https://i.postimg.cc/dQgKn0W1/seukeulinsyas-2026-03-08-194340.png", o: ["왼쪽 하단", "왼쪽 상단", "오른쪽 상단", "오른쪽 하단"], a: 0 },
            { header: "이 모양은 무엇일까요?", img: "https://i.postimg.cc/wjQ86Q9J/seukeulinsyas-2026-03-08-194509.png", o: ["마킹 메뉴", "더블 퍽", "색상 편집기", "툴바"], a: 0 },
            { header: "여기서 할 수 없는 기능은?", img: "https://i.postimg.cc/XJht22ks/seukeulinsyas-2026-03-08-194238.png", o: ["새 스케치 열기", "파일 불러오고 내보내기", "브러시 즐겨찾기", "펜 모드 변경"], a: 2 }
        ];

        let currentQIndex = 0, score = 0, timerInterval = null;

        window.startQuiz = function() {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return;
            window.appState.userName = name;
            document.getElementById('display-name').textContent = name;
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('entry-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            window.appState.startTime = Date.now();
            startTimer();
            loadQuestion();
        };

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - window.appState.startTime) / 1000);
                document.getElementById('timer').textContent = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
            }, 1000);
        }

        function loadQuestion() {
            const q = questions[currentQIndex];
            document.getElementById('q-progress').textContent = `Q ${currentQIndex + 1}/10`;
            document.getElementById('question-header').textContent = q.header;
            document.getElementById('question-img').src = q.img;
            const grid = document.getElementById('options-grid'); grid.innerHTML = '';
            const shuffled = q.o.map((text, i) => ({ text, isCorrect: i === q.a })).sort(() => Math.random() - 0.5);
            shuffled.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = "quiz-card bg-white border-2 border-slate-100 p-6 rounded-2xl text-left font-bold text-slate-700 shadow-sm transition-all text-xl";
                btn.textContent = opt.text;
                btn.onclick = () => handleAnswer(opt.isCorrect, btn);
                grid.appendChild(btn);
            });
        }

        function handleAnswer(isCorrect, btn) {
            const overlay = document.getElementById('feedback-overlay');
            const fEmoji = document.getElementById('feedback-emoji');
            const fText = document.getElementById('feedback-text');
            
            overlay.style.display = 'flex';
            document.querySelectorAll('.quiz-card').forEach(b => b.disabled = true);

            if (isCorrect) {
                score += 100;
                fEmoji.textContent = "✨";
                fText.textContent = "정답입니다!";
                fText.className = "text-5xl font-black text-emerald-600";
                btn.classList.add('border-emerald-500', 'bg-emerald-50');
            } else {
                fEmoji.textContent = "😢";
                fText.textContent = "틀렸습니다!";
                fText.className = "text-5xl font-black text-rose-600";
                btn.classList.add('border-rose-500', 'bg-rose-50');
            }
            
            document.getElementById('live-score').textContent = score;
            setTimeout(() => {
                currentQIndex++; 
                overlay.style.display = 'none';
                if (currentQIndex < 10) loadQuestion(); else finishQuiz();
            }, 1500);
        }

        async function finishQuiz() {
            if (timerInterval) clearInterval(timerInterval);
            const totalTime = Math.floor((Date.now() - window.appState.startTime) / 1000);
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-time').textContent = `${totalTime}s`;
            if (window.appState.isDbConnected) await window.submitScore(score, totalTime);
        }

        function renderLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const noData = document.getElementById('no-data');
            if (!list) return;
            list.innerHTML = '';
            if (window.appState.leaderboard.length === 0) { if (noData) noData.classList.remove('hidden'); return; }
            if (noData) noData.classList.add('hidden');
            window.appState.leaderboard.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-4 rounded-2xl bg-white border border-slate-100 shadow-sm";
                div.innerHTML = `<div class="flex items-center gap-4"><span class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 text-slate-500 font-black text-xs">${index + 1}</span><span class="font-bold">${item.name}</span></div><div class="text-right"><div class="font-black text-indigo-600 text-sm">${item.score}점</div><div class="text-[9px] text-slate-400 font-bold uppercase">${item.time}s</div></div>`;
                list.appendChild(div);
            });
        }

        window.resetApp = function() { location.reload(); };
        window.openResetModal = function() { document.getElementById('reset-modal').classList.add('active'); };
        window.closeResetModal = function() { document.getElementById('reset-modal').classList.remove('active'); };
        window.confirmReset = function() { const pw = document.getElementById('admin-pw').value; window.resetLeaderboardData(pw); };
        function showToast(text, type) {
            const toast = document.getElementById('system-toast');
            if (!toast) return;
            document.getElementById('toast-text').textContent = text;
            toast.className = `fixed top-10 left-1/2 -translate-x-1/2 z-[110] px-8 py-3 rounded-full shadow-2xl font-bold text-sm ${type === 'success' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
